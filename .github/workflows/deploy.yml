name: Deploy Preprod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Install Docker on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ubuntu@${{ secrets.EC2_HOST }} "sudo apt-get update -y && sudo apt-get install -y docker.io && sudo systemctl start docker"

      - name: Copy files
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/key.pem -r ./src ./Dockerfile ./docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/preprod/

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ubuntu@${{ secrets.EC2_HOST }} "cd /home/ubuntu/preprod && sudo docker compose up -d --build"