name: Deploy Preprod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/preprod-key.pem
          chmod 600 ~/.ssh/preprod-key.pem

      - name: Installer Docker sur EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/preprod-key.pem ubuntu@${{ secrets.EC2_HOST }} "
            sudo apt-get update -y &&
            sudo apt-get install -y docker.io docker-compose &&
            sudo systemctl start docker &&
            sudo systemctl enable docker &&
            sudo usermod -aG docker ubuntu
          "

      - name: Copier les fichiers sur EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/preprod-key.pem -r ./src ./Dockerfile ./docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/preprod/

      - name: Déployer sur EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/preprod-key.pem ubuntu@${{ secrets.EC2_HOST }} "
            cd /home/ubuntu/preprod &&
            sudo docker compose up -d --build
          "