<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Préproduction</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #16213e; padding: 2rem 3rem; border-radius: 12px; text-align: center; border: 1px solid #0f3460; }

    p { color: #a8a8b3; }

  </style>
</head>
<body>
  <div class="card">
    <span class="badge">PREPROD</span>
    <h1>Environnement de Préproduction</h1>

    <p>Servi par Nginx dans Docker</p>
  </div>
</body>
</html>
